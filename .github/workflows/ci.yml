          if (errors > 0) process.exit(1);
          console.log('✅ All schemas syntax valid (' + files.length + ' files)');
        "

      - name: Test helpers syntax
        run: node -e "
          require('module-alias/register');
          const { recursiveReadDirSync } = require('@helpers/Utils');
          const files = recursiveReadDirSync('src/helpers');
          let errors = 0;
          for (const file of files) {
            try {
              delete require.cache[require.resolve(file)];
              require(file);
            } catch (ex) {
