name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: 🔍 Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Run ESLint
        run: npm run lint
      - name: Check formatting
        run: npm run format:check

  security:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Run npm audit
        run: npm audit --production --audit-level=high
      - name: Check for exposed secrets
        uses: gitleaks/gitleaks-action@v2

  smoke-test:
    name: 🧪 Smoke Tests
    runs-on: ubuntu-latest
    needs: [lint, security]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Run all checks
        run: |
          node -e "const c=require('./config.js');const r=['OWNER_IDS','CACHE_SIZE','DASHBOARD','MUSIC','EMBED_COLORS','PRESENCE','INTERACTIONS','STATS','SUGGESTIONS','TICKET','ECONOMY','IMAGE','INVITE','AUTOMOD','MODERATION','GIVEAWAYS','MESSAGES','PREFIX_COMMANDS','SUPPORT_SERVER'];const m=r.filter(k=>!(k in c));if(m.length){console.error('Missing:',m.join(', '));process.exit(1)};console.log('✅ Config valid');"
          node -e "require('module-alias/register');console.log('✅ Module aliases resolved');"
          node -e "
            require('module-alias/register');
            const {recursiveReadDirSync} = require('@helpers/Utils');
            const dirs = ['src/commands','src/events','src/handlers','src/database/schemas','src/helpers'];
            let total=0, errors=0;
            for (const dir of dirs) {
              const files = recursiveReadDirSync(dir);
              for (const f of files) {
                try { delete require.cache[require.resolve(f)]; require(f); }
                catch (ex) { console.error('Failed:', f, ex.message); errors++; }
              }
              total += files.length;
            }
            if (errors > 0) process.exit(1);
            console.log('✅ All ' + total + ' files valid');
          "
