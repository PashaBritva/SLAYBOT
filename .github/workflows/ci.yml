          console.log('✅ All handlers syntax valid (' + files.length + ' files)');
        "

      - name: Test database schemas syntax
        run: node -e "
          require('module-alias/register');
          const { recursiveReadDirSync } = require('@helpers/Utils');
          const files = recursiveReadDirSync('src/database/schemas');
          let errors = 0;
          for (const file of files) {
            try {
              delete require.cache[require.resolve(file)];
              require(file);
            } catch (ex) {
              console.error('Failed:', file, ex.message);
              errors++;
