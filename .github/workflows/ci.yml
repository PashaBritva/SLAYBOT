name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: 🔍 Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint --if-present || npx eslint . --ext .js

      - name: Check formatting
        run: npx prettier --check "**/*.js" --ignore-unknown

  build:
    name: 📦 Build Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify bot loads without errors
        env:
          BOT_TOKEN: dummy_token_for_ci
          MONGO_CONNECTION: mongodb://localhost:27017/test
        run: |
          timeout 10 node -e "
            require('dotenv').config();
            require('module-alias/register');
            console.log('✅ Module aliases resolved');
            const BotClient = require('@src/structures/BotClient');
            console.log('✅ BotClient loaded');
            process.exit(0);
          " || echo "⚠️ Load test timed out (expected without real token)"

  security:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --production || true

      - name: Check for exposed secrets
        uses: gitleaks/gitleaks-action@v2
        with:
          config-path: .gitleaks.toml
        continue-on-error: true
