name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: 🔍 Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Run ESLint
        run: npm run lint
      - name: Check formatting
        run: npm run format:check

  security:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Run npm audit
        run: npm audit --production --audit-level=high
      - name: Check for exposed secrets
        uses: gitleaks/gitleaks-action@v2
        with:
          config-path: .gitleaks.toml

  smoke-test:
    name: 🧪 Smoke Tests
    runs-on: ubuntu-latest
    needs: [lint, security]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Install dependencies
        run: npm ci

      - name: Validate config.js
        run: node -e "const c=require('./config.js');const r=['OWNER_IDS','CACHE_SIZE','DASHBOARD','MUSIC','EMBED_COLORS','PRESENCE','INTERACTIONS','STATS','SUGGESTIONS','TICKET','ECONOMY','IMAGE','INVITE','AUTOMOD','MODERATION','GIVEAWAYS','MESSAGES','PREFIX_COMMANDS','SUPPORT_SERVER'];const m=r.filter(k=>!(k in c));if(m.length){console.error('Missing:',m.join(', '));process.exit(1)};console.log('✅ Config valid');"

      - name: Test module aliases
        run: node -e "require('module-alias/register');console.log('✅ Module aliases resolved');"

      - name: Test commands syntax
        run: node -e "require('module-alias/register');const{recursiveReadDirSync}=require('@helpers/Utils');const files=recursiveReadDirSync('src/commands');let e=0;for(const f of files){try{delete require.cache[require.resolve(f)];require(f)}catch(ex){console.error('Failed:',f,ex.message);e++}};if(e>0)process.exit(1);console.log('✅ All commands valid ('+files.length+' files)');"

      - name: Test events syntax
        run: node -e "require('module-alias/register');const{recursiveReadDirSync}=require('@helpers/Utils');const files=recursiveReadDirSync('src/events');let e=0;for(const f of files){try{delete require.cache[require.resolve(f)];require(f)}catch(ex){console.error('Failed:',f,ex.message);e++}};if(e>0)process.exit(1);console.log('✅ All events valid ('+files.length+' files)');"

      - name: Test handlers syntax
        run: node -e "require('module-alias/register');const{recursiveReadDirSync}=require('@helpers/Utils');const files=recursiveReadDirSync('src/handlers');let e=0;for(const f of files){try{delete require.cache[require.resolve(f)];require(f)}catch(ex){console.error('Failed:',f,ex.message);e++}};if(e>0)process.exit(1);console.log('✅ All handlers valid ('+files.length+' files)');"

      - name: Test database schemas
        run: node -e "require('module-alias/register');const{recursiveReadDirSync}=require('@helpers/Utils');const files=recursiveReadDirSync('src/database/schemas');let e=0;for(const f of files){try{delete require.cache[require.resolve(f)];require(f)}catch(ex){console.error('Failed:',f,ex.message);e++}};if(e>0)process.exit(1);console.log('✅ All schemas valid ('+files.length+' files)');"

      - name: Test helpers syntax
        run: node -e "require('module-alias/register');const{recursiveReadDirSync}=require('@helpers/Utils');const files=recursiveReadDirSync('src/helpers');let e=0;for(const f of files){try{delete require.cache[require.resolve(f)];require(f)}catch(ex){console.error('Failed:',f,ex.message);e++}};if(e>0)process.exit(1);console.log('✅ All helpers valid ('+files.length+' files)');"
