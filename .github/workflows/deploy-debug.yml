name: Deploy Debug

on:
  workflow_run:
    workflows: ["CI"]
    branches: [develop]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: deploy-debug
  cancel-in-progress: false

jobs:
  check-ci:
    name: ✅ Check CI Status
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: CI Passed
        run: echo "✅ CI passed, proceeding with debug deployment"

  deploy-debug:
    name: 🧪 Deploy Debug Bot
    runs-on: ubuntu-latest
    needs: check-ci
    if: ${{ always() && (github.event_name == 'workflow_dispatch' || needs.check-ci.result == 'success') }}
    environment:
      name: debug
    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Create .env file
        run: |
          cat > .env << EOF
          BOT_TOKEN=${{ secrets.DEBUG_BOT_TOKEN }}
          MONGO_CONNECTION=${{ secrets.DEBUG_MONGO_CONNECTION }}
          ERROR_LOGS=${{ secrets.DEBUG_ERROR_LOGS }}
          JOIN_LEAVE_LOGS=${{ secrets.DEBUG_JOIN_LEAVE_LOGS }}
          BOT_SECRET=${{ secrets.DEBUG_BOT_SECRET }}
          SESSION_PASSWORD=${{ secrets.SESSION_PASSWORD }}
          WEATHERSTACK_KEY=${{ secrets.WEATHERSTACK_KEY }}
          STRANGE_API_KEY=${{ secrets.STRANGE_API_KEY }}
          SPOTIFY_CLIENT_ID=${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET=${{ secrets.SPOTIFY_CLIENT_SECRET }}
          EOF

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            DEPLOY_DIR="${{ secrets.DEBUG_DEPLOY_PATH || '/opt/slaybot-debug' }}"
            mkdir -p "$DEPLOY_DIR"
            cd "$DEPLOY_DIR"

            # Init repo if needed
            if [ ! -d ".git" ]; then
              git init
              git remote add origin ${{ secrets.REPO_URL }}
            fi

            # Pull develop branch
            git fetch origin develop
            git reset --hard origin/develop

            # Install dependencies
            npm ci --omit=dev

            # Restart debug bot
            pm2 reload slaybot-debug --update-env 2>/dev/null || pm2 start bot.js --name slaybot-debug --no-daemon
            pm2 save

            # Show status
            pm2 status

      - name: Health Check
        run: |
          echo "Waiting for debug bot to start..."
          sleep 10
          echo "✅ Debug deployment complete!"
