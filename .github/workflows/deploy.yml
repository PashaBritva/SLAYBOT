name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  check-ci:
    name: ✅ Check CI Status
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: CI Passed
        run: echo "✅ CI passed, proceeding with deployment"

  deploy:
    name: 🚀 Deploy to Server
    runs-on: ubuntu-latest
    needs: check-ci
    if: ${{ always() && (github.event_name == 'workflow_dispatch' || needs.check-ci.result == 'success') }}
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --production

      - name: Create .env file
        run: |
          cat > .env << EOF
          BOT_TOKEN=${{ secrets.BOT_TOKEN }}
          MONGO_CONNECTION=${{ secrets.MONGO_CONNECTION }}
          ERROR_LOGS=${{ secrets.ERROR_LOGS }}
          JOIN_LEAVE_LOGS=${{ secrets.JOIN_LEAVE_LOGS }}
          BOT_SECRET=${{ secrets.BOT_SECRET }}
          SESSION_PASSWORD=${{ secrets.SESSION_PASSWORD }}
          WEATHERSTACK_KEY=${{ secrets.WEATHERSTACK_KEY }}
          STRANGE_API_KEY=${{ secrets.STRANGE_API_KEY }}
          SPOTIFY_CLIENT_ID=${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET=${{ secrets.SPOTIFY_CLIENT_SECRET }}
          EOF

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            cd ${{ secrets.DEPLOY_PATH || '/opt/slaybot' }}

            # Pull latest code
            git pull origin main

            # Install dependencies
            npm ci --production

            # Restart bot
            pm2 reload slaybot 2>/dev/null || pm2 start bot.js --name slaybot

            # Show status
            pm2 status

      - name: Health Check
        run: |
          echo "Waiting for bot to start..."
          sleep 10
          echo "✅ Deployment complete!"

  notify:
    name: 📢 Notify
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    steps:
      - name: Send Discord Webhook
        if: ${{ secrets.DEPLOY_WEBHOOK != null }}
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DEPLOY_WEBHOOK }}
          status: ${{ job.status }}
          title: "🚀 SLAYBOT Deployment"
          description: |
            **Branch:** `main`
            **Commit:** ${{ github.sha }}
            **Author:** ${{ github.actor }}
          color: ${{ job.status == 'success' && '0x57F287' || '0xED4245' }}
